# Nombre de la aplicacion
spring.application.name=paradabus-backend

# Puerto del backend
server.port=8080

# Base de datos PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/paradabus_db
spring.datasource.username=postgres
spring.datasource.password=postgres

# Driver de PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway para crear las tablas con SQL
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Zona horaria
spring.jackson.time-zone=Europe/Madrid

# Codificacion
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# URLs externas de datos abiertos de Vigo
paradabus.fuentes.paradas=https://datos.vigo.org/data/transporte/paradas.json
paradabus.fuentes.lineas-geojson=https://datos.vigo.org/data/transporte/lineas.geojson
paradabus.fuentes.avisos=https://datos.vigo.org/data/avisos/avisos_transporte_es.json

# InfoBus / QR
# De momento lo dejamos preparado, pero no sera la fuente principal de rutas.
# Servira mas adelante para proximos buses en una parada concreta si vemos que responde bien.
paradabus.fuentes.infobus=https://infobus.vitrasa.es:8002/Default.aspx?parada=

# GTFS oficial de Vitrasa / Vigo
# Lo usaremos para horarios, rutas, sentidos, paradas ordenadas y transbordos.
paradabus.fuentes.gtfs=https://datos.vigo.org/data/transporte/gtfs_vigo.zip

# Configuracion futura para calculo de rutas
paradabus.rutas.radio-origen-metros=500
paradabus.rutas.radio-destino-metros=500
paradabus.rutas.espera-maxima-transbordo-minutos=10
paradabus.rutas.tiempo-maximo-andando-minutos=10